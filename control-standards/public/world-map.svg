<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ddff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Grid -->
  <pattern id="grid" width="5" height="5" patternUnits="userSpaceOnUse">
    <path d="M5 0L0 0 0 5" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.2"/>
  </pattern>
  <rect width="100" height="50" fill="url(#grid)"/>

  <!-- Continent group with glass effect -->
  <g filter="url(#glow)">
    <!-- North America -->
    <path d="M10,3 L14,2 L18,2 L22,2.5 L26,3.5 L28,5 L30,7 L30,9 L28,11 L26,13 L24,14 L22,15 L20,16 L18,15 L16,14 L14,13 L12,12 L10,10 L8,8 L8,6 L8,4 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- Central America -->
    <path d="M22,15 L23,17 L22.5,19 L22,21 L21,22 L20,23 L19,22 L18,20 L18,18 L20,16 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- South America -->
    <path d="M24,24 L28,24 L30,26 L32,28 L32,32 L30,36 L28,40 L26,43 L24,44 L22,43 L20,40 L18,36 L18,32 L20,28 L22,25 Z" fill="url(#g2)" stroke="rgba(0,221,255,0.3)" stroke-width="0.3"/>
    <!-- Europe -->
    <path d="M40,4 L44,3 L48,4 L50,6 L50,8 L48,10 L46,12 L44,13 L42,13 L40,12 L38,10 L38,8 L38,6 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- UK -->
    <path d="M37,3 L38.5,3 L39,4 L38.5,5 L37,5 L36.5,4 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- Scandinavia -->
    <path d="M46,1 L48,0.5 L49,1 L49.5,2.5 L48.5,3.5 L47,3.5 L46,2.5 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- Africa -->
    <path d="M38,17 L42,17 L46,18 L48,20 L50,23 L50,26 L48,29 L46,32 L44,34 L42,35 L40,34 L38,32 L36,29 L34,25 L34,22 L36,19 Z" fill="url(#g2)" stroke="rgba(0,221,255,0.3)" stroke-width="0.3"/>
    <!-- Madagascar -->
    <path d="M52,30 L53,29 L53.5,31 L53,33 L52,32 Z" fill="url(#g2)" stroke="rgba(0,221,255,0.3)" stroke-width="0.2"/>
    <!-- Asia -->
    <path d="M48,3 L54,2 L60,2 L66,3 L70,5 L72,8 L72,11 L70,14 L66,17 L62,19 L58,20 L54,20 L50,19 L46,17 L44,14 L44,10 L44,7 L46,5 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- Middle East / Arabia -->
    <path d="M46,18 L50,18 L52,19 L54,21 L54,23 L52,25 L50,26 L48,26 L46,25 L44,23 L44,21 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- India subcontinent -->
    <path d="M52,23 L55,23 L56,25 L55.5,28 L54,30 L52.5,30 L51,28.5 L50.5,26 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- Southeast Asia -->
    <path d="M62,22 L66,22 L68,24 L68,27 L66,30 L64,32 L62,32 L60,30 L58,27 L58,24 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- Japan / Korea -->
    <path d="M72,7 L73.5,6 L74,8 L73.5,10 L72,11 L71,10 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
    <!-- Indonesia / Philippines -->
    <path d="M66,32 L70,32 L72,33 L71,34 L68,34 L66,33 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.2"/>
    <path d="M73,30 L75.5,30 L76,31 L75,32 L73,31.5 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.2"/>
    <!-- Australia -->
    <path d="M73,31 L77,31 L80,33 L80,36 L78,39 L74,40 L70,39 L68,37 L68,34 L70,32 Z" fill="url(#g2)" stroke="rgba(0,221,255,0.3)" stroke-width="0.3"/>
    <!-- New Zealand -->
    <path d="M83,37 L84,36 L84.5,38 L84,40 L83,39 Z" fill="url(#g2)" stroke="rgba(0,221,255,0.3)" stroke-width="0.2"/>
    <!-- Greenland -->
    <path d="M28,1 L32,0.5 L34,1 L34,3 L32,4 L29,4 L28,3 Z" fill="url(#g1)" stroke="rgba(0,204,255,0.3)" stroke-width="0.3"/>
  </g>
</svg>