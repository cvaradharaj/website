name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: control-standards/package-lock.json
      - run: npm ci
        working-directory: control-standards
      - run: npm run build
        working-directory: control-standards
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: de55f63f462aa0b3bb0a66ed5f6ea3f6
          command: pages deploy control-standards/out --project-name website
